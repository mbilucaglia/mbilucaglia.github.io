short_bio: "I am a Bioengineer at the [Behaviour and Brain Lab IULM - Neuromarketing Research Center](https://en.brainlabiulm.com/), and a Ph.D. Candidate in Communication, Markets and Society at [Università IULM](https://www.iulm.it/en/home). My work spans the full lifecycle of physiological signals in experimental research (mainly Consumer Neruoscience and Neuromarketing), from acquisition and multimodal synchronization to artifact cleaning and data classification."
