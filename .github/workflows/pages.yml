name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "17 5 * * 1"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bibliometric updater dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install \
            "requests>=2.31,<3"

      - name: Update Google Scholar metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          SCHOLAR_ID: RvAqXUIAAAAJ
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scripts/update_scholar_metrics.py \
            --scholar-id "$SCHOLAR_ID" \
            --output _data/scholar.json \
            --bibliography _bibliography/publications.bib \
            --top-cited-bibliography _bibliography/top_cited.bib \
            --publication-metrics _data/publication_metrics.json \
            --top-papers 5 \
            --scholar-articles 100

      - name: Update Elsevier source metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          ELSEVIER_INSTTOKEN: ${{ secrets.ELSEVIER_INSTTOKEN }}
        run: |
          python scripts/update_elsevier_source_metrics.py \
            --bibliography _bibliography/publications.bib \
            --source-output _data/elsevier_source_metrics.json \
            --publication-output _data/publication_metrics.json \
            --asjc-codes _data/asjc_codes.json

      - name: Verify bibliometric outputs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          scholar_path = Path("_data/scholar.json")
          top_cited_path = Path("_bibliography/top_cited.bib")
          elsevier_path = Path("_data/elsevier_source_metrics.json")
          publication_metrics_path = Path("_data/publication_metrics.json")
          asjc_codes_path = Path("_data/asjc_codes.json")

          required_paths = [
              scholar_path,
              top_cited_path,
              elsevier_path,
              publication_metrics_path,
              asjc_codes_path,
          ]

          for path in required_paths:
              if not path.exists():
                  raise SystemExit(f"{path} does not exist")

          scholar = json.loads(
              scholar_path.read_text(encoding="utf-8")
          )

          scholar_required = [
              "citations",
              "h_index",
              "i10_index",
              "top_cited_papers",
              "top_cited_bibtex_keys",
              "publication_metrics_matched_keys",
          ]

          missing_scholar = [
              key
              for key in scholar_required
              if key not in scholar
          ]

          if missing_scholar:
              raise SystemExit(
                  "Missing Scholar data: "
                  + ", ".join(missing_scholar)
              )

          if not scholar["top_cited_bibtex_keys"]:
              raise SystemExit(
                  "No top-cited papers were matched to BibTeX keys"
              )

          if not scholar["publication_metrics_matched_keys"]:
              raise SystemExit(
                  "No Google Scholar papers were matched to publication_metrics.json"
              )

          top_cited_text = top_cited_path.read_text(encoding="utf-8")

          if not re.search(r"@\w+\s*\{", top_cited_text):
              raise SystemExit(
                  "_bibliography/top_cited.bib does not contain BibTeX entries"
              )

          missing_top_cited_keys = [
              key
              for key in scholar["top_cited_bibtex_keys"]
              if key not in top_cited_text
          ]

          if missing_top_cited_keys:
              raise SystemExit(
                  "Matched keys missing from top_cited.bib: "
                  + ", ".join(missing_top_cited_keys)
              )

          elsevier = json.loads(
              elsevier_path.read_text(encoding="utf-8")
          )

          publication_metrics = json.loads(
              publication_metrics_path.read_text(encoding="utf-8")
          )

          asjc_codes = json.loads(
              asjc_codes_path.read_text(encoding="utf-8")
          )

          if not elsevier:
              raise SystemExit(
                  "_data/elsevier_source_metrics.json is empty"
              )

          if not publication_metrics:
              raise SystemExit(
                  "_data/publication_metrics.json is empty"
              )

          if not asjc_codes:
              raise SystemExit(
                  "_data/asjc_codes.json is empty"
              )

          matched_elsevier = [
              key
              for key, value in publication_metrics.items()
              if isinstance(value, dict)
              and value.get("elsevier_matched")
          ]

          matched_scholar = [
              key
              for key, value in publication_metrics.items()
              if isinstance(value, dict)
              and value.get("google_scholar_citations") is not None
          ]

          matched_categories = [
              key
              for key, value in publication_metrics.items()
              if isinstance(value, dict)
              and value.get("citescore_category")
          ]

          if not matched_elsevier:
              raise SystemExit(
                  "No publications were matched to Elsevier source metrics"
              )

          if not matched_scholar:
              raise SystemExit(
                  "No publications have Google Scholar citation counts"
              )

          if not matched_categories:
              raise SystemExit(
                  "No publications have CiteScore category names"
              )

          print("Bibliometric outputs verified")
          print(f"Citations: {scholar['citations']}")
          print(f"h-index: {scholar['h_index']}")
          print(f"i10-index: {scholar['i10_index']}")
          print(f"Scholar source: {scholar.get('source')}")
          print(
              "Top-cited BibTeX keys: "
              + ", ".join(scholar["top_cited_bibtex_keys"])
          )
          print(
              "Google Scholar matched keys: "
              + ", ".join(scholar["publication_metrics_matched_keys"])
          )
          print(f"Elsevier ISSNs indexed: {len(elsevier)}")
          print(f"Elsevier-matched publications: {len(matched_elsevier)}")
          print(f"Google Scholar citation-count publications: {len(matched_scholar)}")
          print(f"CiteScore category publications: {len(matched_categories)}")
          PY

      - name: Commit updated bibliometric data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet -- \
            _data/scholar.json \
            _bibliography/top_cited.bib \
            _data/elsevier_source_metrics.json \
            _data/publication_metrics.json; then
            echo "Bibliometric data are unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            _data/scholar.json \
            _bibliography/top_cited.bib \
            _data/elsevier_source_metrics.json \
            _data/publication_metrics.json

          git commit -m "Update bibliometric data"
          git push

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
