name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "17 5 * * 1"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Scholar updater dependencies
        run: |
          python -m pip install \
            "beautifulsoup4>=4.12,<5" \
            "requests>=2.31,<3"

      - name: Update Google Scholar metrics
        env:
          SCHOLAR_ID: RvAqXUIAAAAJ
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scripts/update_scholar_metrics.py \
            --scholar-id "$SCHOLAR_ID" \
            --output _data/scholar.json

      - name: Commit updated Scholar metrics
        run: |
          if git diff --quiet -- _data/scholar.json; then
            echo "Google Scholar metrics are unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add _data/scholar.json
          git commit -m "Update Google Scholar metrics"

          git push || echo \
            "::warning::Metrics were deployed but could not be committed."

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
