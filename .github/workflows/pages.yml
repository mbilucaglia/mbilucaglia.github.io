name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  schedule:
    - cron: "17 5 * * 1"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Scholar updater dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install \
            "beautifulsoup4>=4.12,<5" \
            "requests>=2.31,<3"

      - name: Update Google Scholar metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          SCHOLAR_ID: RvAqXUIAAAAJ
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python scripts/update_scholar_metrics.py \
            --scholar-id "$SCHOLAR_ID" \
            --output _data/scholar.json \
            --top-papers 5 \
            --bibliography _bibliography/publications.bib \
            --top-cited-bibliography _bibliography/top_cited.bib

      - name: Verify Google Scholar metrics and top-cited bibliography
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          scholar_path = Path("_data/scholar.json")
          top_cited_path = Path("_bibliography/top_cited.bib")

          if not scholar_path.exists():
              raise SystemExit("_data/scholar.json does not exist")

          if not top_cited_path.exists():
              raise SystemExit("_bibliography/top_cited.bib does not exist")

          data = json.loads(
              scholar_path.read_text(encoding="utf-8")
          )

          required = [
              "citations",
              "h_index",
              "i10_index",
              "top_cited_papers",
              "top_cited_bibtex_keys",
          ]

          missing = [
              key
              for key in required
              if key not in data
          ]

          if missing:
              raise SystemExit(
                  "Missing Scholar data: "
                  + ", ".join(missing)
              )

          if not data["top_cited_bibtex_keys"]:
              raise SystemExit(
                  "No top-cited papers were matched to BibTeX keys"
              )

          bibtex_text = top_cited_path.read_text(encoding="utf-8")

          if "@article" not in bibtex_text.lower():
              raise SystemExit(
                  "_bibliography/top_cited.bib does not contain BibTeX entries"
              )

          print("Scholar metrics verified")
          print(f"Citations: {data['citations']}")
          print(f"h-index: {data['h_index']}")
          print(f"i10-index: {data['i10_index']}")
          print(f"Updated at: {data.get('updated_at')}")
          print(f"Source: {data.get('source')}")
          print(
              "Matched BibTeX keys: "
              + ", ".join(data["top_cited_bibtex_keys"])
          )
          PY

      - name: Commit updated Scholar metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet -- _data/scholar.json _bibliography/top_cited.bib; then
            echo "Google Scholar metrics and top-cited bibliography are unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add _data/scholar.json _bibliography/top_cited.bib
          git commit -m "Update Google Scholar metrics"
          git push

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
