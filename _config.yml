# === Site settings ===
locale: en-US
title: "Marco Bilucaglia"
description: "Bioengineer · Ph.D. Candidate · Neuromarketing"
url: ""   # GitHub Pages will set this automatically
baseurl: ""   # leave empty for your main site (https://username.github.io)
repository: mbilucaglia/mbilucaglia.github.io

# === Author info ===
author:
  name: "Marco Bilucaglia, M.Sc., C.Eng."
  avatar: "/assets/img/headshot.jpg"   # replace with your photo file
  bio: "Bioengineer at Behavior and Brain Lab IULM. Ph.D. candidate (Neuromarketing) at Università IULM."
  location: "Milan, Italy"
  email: "marco.bilucaglia@studenti.iulm.it"
  orcid: "0000-0000-0000-0000"   # update with your real ORCID
  scholar: "https://bit.ly/3GY8weY"
  github: "marcobilucaglia"
  linkedin: ""   # optional

# === Theme ===
remote_theme: academicpages/academicpages.github.io
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

# === Collections ===
collections:
  teaching:
    output: true
  publications:
    output: true
  talks:
    output: true

# === Markdown rendering ===
markdown: kramdown
highlighter: rouge
permalink: pretty

# === Defaults for layouts ===
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_publications"
      type: publications
    values:
      layout: publication
      author_profile: true

# === Pagination (optional) ===
paginate: 5
paginate_path: "/page:num/"

# === Social media usernames (optional) ===
social:
  github: marcobilucaglia
  scholar: https://bit.ly/3GY8weY
  orcid: https://bit.ly/3R7BmxJ
  email: marco.bilucaglia@studenti.iulm.it
